name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Format check
        run: zig fmt --check build.zig src/*.zig
      - name: Test
        run: zig build test
      - name: Build
        run: zig build
